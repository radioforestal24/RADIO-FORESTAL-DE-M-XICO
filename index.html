<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radio Forestal de México</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1DB954">

<style>

/* 🌑 BASE */
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top,#1a1a1a,#000);
color:white;
scroll-behavior:smooth;
}

/* HEADER */
header{
background:rgba(0,0,0,0.6);
backdrop-filter: blur(10px);
padding:15px;
text-align:center;
color:#1DB954;
font-weight:bold;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
font-size:14px;
}

nav a:hover{
color:#1DB954;
}

/* HERO */
.hero{
text-align:center;
padding:50px 20px;
}

.btn{
background:#1DB954;
border:none;
padding:16px 30px;
border-radius:50px;
font-size:16px;
font-weight:bold;
cursor:pointer;
color:white;
box-shadow:0 10px 25px rgba(0,0,0,.4);
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
background:#1ed760;
}

/* LIVE */
.live{
margin-top:10px;
color:red;
font-weight:bold;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0.3;}
}

/* WAVES */
#waves{
display:flex;
justify-content:center;
gap:4px;
margin-top:20px;
height:40px;
}

.bar{
width:5px;
background:#1DB954;
animation:wave 1s infinite ease-in-out;
}

.bar:nth-child(2){animation-delay:0.1s;}
.bar:nth-child(3){animation-delay:0.2s;}
.bar:nth-child(4){animation-delay:0.3s;}
.bar:nth-child(5){animation-delay:0.4s;}

@keyframes wave{
0%,100%{height:5px;}
50%{height:40px;}
}

/* 🖼️ GALERÍA SLIDER AUTOMÁTICO */
.gallery{
padding:20px;
text-align:center;
}

.slider{
display:flex;
overflow:hidden;
width:100%;
border-radius:15px;
position:relative;
}

.slider-track{
display:flex;
width:calc(300px * 10);
animation:scroll 25s linear infinite;
}

.slider img{
width:300px;
height:200px;
object-fit:cover;
border-radius:15px;
margin-right:10px;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* 💬 COMENTARIOS */
.comments{
padding:20px;
}

.comments textarea{
width:100%;
height:80px;
border-radius:10px;
padding:10px;
}

.comments button{
margin-top:10px;
background:#1DB954;
border:none;
padding:10px 20px;
border-radius:20px;
color:white;
cursor:pointer;
}

.comment-box{
background:#181818;
padding:10px;
margin-top:10px;
border-radius:10px;
}

/* 📱 RESPONSIVE */
@media (max-width:768px){

.btn{
width:90%;
}

.slider img{
width:220px;
height:160px;
}

}

</style>

</head>

<body>

<header>
🌲 RADIO FORESTAL DE MÉXICO

<nav>
<a href="#inicio">Inicio</a>
<a href="#radio">Radio</a>
<a href="#galeria">Galería</a>
<a href="#comentarios">Comentarios</a>
</nav>
</header>

<!-- RADIO -->
<section id="inicio">

<div class="hero">

<img src="logo-web.png" style="max-width:180px;margin-bottom:20px;">

<button class="btn"
onclick="
var a=document.getElementById('radio');
if(a.paused){
a.play();
document.getElementById('onair').style.display='block';
}else{
a.pause();
document.getElementById('onair').style.display='none';
}
">
▶ ESCUCHAR EN VIVO
</button>

<div id="onair" class="live" style="display:none;">🔴 EN VIVO</div>

<div id="waves">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<audio id="radio">
<source src="https://stereomia.ddns.net/stream" type="audio/mpeg">
</audio>

</div>

</section>

<!-- 🖼️ GALERÍA AUTO SLIDER -->
<section id="galeria" class="gallery">

<h2>📸 Galería</h2>

<div class="slider">
<div class="slider-track">

<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">
<img src="foto4.jpg">
<img src="foto1.jpg">
<img src="foto2.jpg">

</div>
</div>

</section>

<!-- 💬 COMENTARIOS -->
<section id="comentarios" class="comments">

<h2>💬 Comentarios</h2>

<textarea id="commentText" placeholder="Escribe tu comentario..."></textarea>
<br>
<button onclick="addComment()">Enviar comentario</button>

<div id="commentList"></div>

</section>

<script>

/* 💬 comentarios locales */
function addComment(){
let text=document.getElementById("commentText").value;
if(!text)return;

let comments=JSON.parse(localStorage.getItem("comments")||"[]");
comments.unshift(text);
localStorage.setItem("comments",JSON.stringify(comments));

loadComments();
document.getElementById("commentText").value="";
}

function loadComments(){
let comments=JSON.parse(localStorage.getItem("comments")||"[]");
let html="";

comments.forEach(c=>{
html+=`<div class='comment-box'>💬 ${c}</div>`;
});

document.getElementById("commentList").innerHTML=html;
}

loadComments();

/* PWA */
if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>
</html>
